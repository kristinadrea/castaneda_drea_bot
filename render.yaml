services:
  - type: worker
    name: castaneda-quotes-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: CHANNEL_ID
        sync: false
      - key: ADMIN_USER_ID
        sync: false
      - key: DATA_DIR
        value: /opt/render/project/src/data
      - key: MEDIA_URLS_FILE
        value: media_urls.txt
